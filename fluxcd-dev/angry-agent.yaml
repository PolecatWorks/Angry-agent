---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mfe-angry-agent
spec:
  releaseName: mfe-angry-agent
  chartRef:
    kind: OCIRepository
    name: mfe-shell
  interval: 50m
  install:
    remediation:
      retries: 3
  values:
    image:
      repository: ghcr.io/polecatworks/angry-agent-ui
      tag: main
      pullPolicy: Always # Dev ONLY
    env:
      - name: SERVE_ROOT
        value: /mfe/angry-agent

    config:
      contents:
        config.json: |
          {
            "apiUrl": "/agent-be/api"
          }
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: angry-agent
spec:
  releaseName: angry-agent
  chartRef:
    kind: OCIRepository
    name: angry-agent
  interval: 50m
  install:
    remediation:
      retries: 3
  values:
    image:
      tag: main
      pullPolicy: Always
    configs:
      webservice:
        url: http://0.0.0.0:8080/agent-be
      persistence:
        db:
          connection:
            url: postgresql://cnpg-db0-cluster-rw.dbs:5432/angry_agent
      aiclient:
        ollama_base_url: http://ollama.ollama:11434
    volumes:
      - name: configs
        configMap:
          name: '{{ template "agent-be.fullname" . }}'
      - name: secrets
        projected:
          sources:
            - secret:
                name: db0-angry-agent-user
                items:
                  - key: username
                    path: persistence/db/connection/username
                  - key: password
                    path: persistence/db/connection/password
