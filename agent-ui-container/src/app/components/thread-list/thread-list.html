<div class="p-6 h-full flex flex-col bg-surface-container-low">
    <div class="flex items-center gap-3 mb-8">
        <div class="w-8 h-8 rounded-lg action-gradient flex items-center justify-center text-white">
            <span class="material-symbols-outlined text-sm" data-icon="hub">hub</span>
        </div>
        <h1 class="text-xl font-bold text-on-surface font-headline">Nexus AI</h1>
    </div>

    <button (click)="newChat()" class="w-full py-3 px-4 mb-8 action-gradient text-white rounded-xl font-headline font-bold flex items-center justify-center gap-2 shadow-lg shadow-primary/20 hover:opacity-90 transition-all active:scale-[0.98]">
        <span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
        New Thread
    </button>

    <nav class="space-y-1 flex-1 overflow-y-auto">
        <a *ngFor="let thread of threads$ | async"
           [routerLink]="['chat', thread.thread_id]"
           routerLinkActive="bg-white/50 text-primary border-l-4 border-primary"
           class="flex items-center justify-between gap-3 px-4 py-3 font-manrope text-sm font-semibold tracking-tight transition-colors group text-on-surface-variant hover:bg-surface-container-high"
           (click)="audioService.playChangeThread()"
           [title]="thread.title || 'New Chat'">
            <div class="flex items-center gap-3 overflow-hidden">
                <span class="material-symbols-outlined shrink-0" data-icon="forum">forum</span>
                <span class="truncate">{{ thread.title || 'New Chat' }}</span>
            </div>

            <button class="shrink-0 opacity-0 group-hover:opacity-100 transition-opacity p-1 hover:bg-black/5 rounded-full" (click)="editThread($event, thread)">
                <span class="material-symbols-outlined text-[16px]" data-icon="edit">edit</span>
            </button>
        </a>

        <div class="h-8"></div>

        <a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant font-manrope text-sm font-semibold tracking-tight hover:bg-surface-container-high transition-colors" href="#">
            <span class="material-symbols-outlined" data-icon="analytics">analytics</span>
            Insights Library
        </a>
        <a [routerLink]="['settings']" routerLinkActive="bg-white/50 text-primary border-l-4 border-primary" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant font-manrope text-sm font-semibold tracking-tight hover:bg-surface-container-high transition-colors group cursor-pointer">
            <span class="material-symbols-outlined" data-icon="settings">settings</span>
            Settings
        </a>
    </nav>
</div>
