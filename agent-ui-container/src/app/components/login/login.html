<div class="h-screen w-full flex items-center justify-center bg-background selection:bg-primary-fixed">
  <div class="max-w-md w-full bg-white/70 backdrop-blur-xl rounded-[2rem] p-10 shadow-2xl shadow-primary/10 border border-white/40">
    <div class="flex flex-col items-center mb-10 text-center">
      <div class="w-16 h-16 rounded-2xl action-gradient flex items-center justify-center text-white mb-6 shadow-xl shadow-primary/30">
        <span class="material-symbols-outlined text-3xl" data-icon="hub">hub</span>
      </div>
      <h1 class="text-4xl font-headline font-extrabold text-on-surface mb-2 tracking-tight">Nexus AI</h1>
      <p class="text-on-surface-variant font-medium">Strategic Intelligence Portal</p>
    </div>

    <div class="space-y-6">
      <div class="space-y-2">
        <label class="text-[11px] font-bold text-outline uppercase tracking-[0.1em] ml-1">Workspace ID</label>
        <div class="relative group transition-all">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="person_outline">person_outline</span>
          <input type="text"
                 [(ngModel)]="username"
                 (keyup.enter)="login()"
                 placeholder="Enter your corporate ID"
                 class="w-full pl-12 pr-4 py-4 bg-white rounded-2xl border border-outline-variant/20 focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all outline-none font-medium text-on-surface">
        </div>
      </div>

      <button (click)="login()"
              class="w-full py-5 action-gradient text-white rounded-2xl font-headline font-bold text-lg shadow-xl shadow-primary/20 hover:opacity-95 hover:shadow-2xl hover:scale-[1.01] active:scale-[0.99] transition-all flex items-center justify-center gap-3">
        Sign into Atrium
        <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
      </button>
    </div>

    <div class="mt-12 text-center">
      <p class="text-[10px] font-bold text-outline uppercase tracking-widest bg-surface-container-high/50 inline-block px-4 py-1.5 rounded-full border border-outline-variant/10">
        Enterprise Protocol Enabled v3.4
      </p>
    </div>
  </div>
</div>
