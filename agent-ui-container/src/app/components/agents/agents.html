<div class="h-full bg-surface-container-low flex flex-col items-center">
    <!-- Header -->
    <div class="w-full h-[60px] min-h-[60px] bg-surface flex items-center px-6 border-b border-outline-variant/30 flex-shrink-0 sticky top-0 z-10 shadow-sm">
        <div class="max-w-4xl w-full mx-auto flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center">
                <span class="material-symbols-outlined text-primary text-xl" data-icon="robot_2">robot_2</span>
            </div>
            <div class="flex flex-col">
                <h1 class="text-on-surface font-manrope text-lg font-bold tracking-tight leading-tight">Agents</h1>
                <span class="text-on-surface-variant font-manrope text-xs font-medium">Manage AI agent definitions</span>
            </div>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="w-full flex-1 overflow-y-auto px-6 py-8">
        <div class="max-w-4xl w-full mx-auto flex flex-col gap-6">

            <div *ngIf="loading" class="text-on-surface-variant text-sm font-manrope text-center py-10">
                Loading agents...
            </div>

            <div *ngIf="error" class="bg-error/10 text-error p-4 rounded-xl text-sm font-manrope border border-error/20">
                {{ error }}
            </div>

            <!-- List View -->
            <div *ngIf="!loading && !isEditing" class="flex flex-col gap-4">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-on-surface font-manrope text-md font-bold tracking-tight">Available Agents</h2>
                    <button (click)="newAgent()" class="h-9 px-4 rounded-full bg-primary text-on-primary font-manrope text-sm font-semibold tracking-wide hover:bg-primary/90 transition-colors shadow-sm flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm" data-icon="add">add</span>
                        New Agent
                    </button>
                </div>

                <div *ngIf="agents.length === 0" class="bg-surface p-8 rounded-2xl border border-outline-variant/30 shadow-sm text-center">
                    <div class="w-12 h-12 rounded-full bg-surface-variant/50 flex items-center justify-center mx-auto mb-3">
                        <span class="material-symbols-outlined text-on-surface-variant text-2xl" data-icon="robot_2">robot_2</span>
                    </div>
                    <p class="text-on-surface-variant font-manrope text-sm">No agents found.</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div *ngFor="let agent of agents"
                         (click)="selectAgent(agent)"
                         class="bg-surface p-5 rounded-2xl border border-outline-variant/30 shadow-sm hover:shadow-md hover:border-primary/30 transition-all cursor-pointer group flex flex-col h-full">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center flex-shrink-0">
                                    <span class="material-symbols-outlined text-primary text-sm" data-icon="smart_toy">smart_toy</span>
                                </div>
                                <h3 class="text-on-surface font-manrope text-base font-bold tracking-tight truncate">{{ agent.name }}</h3>
                            </div>
                            <button (click)="deleteAgent(agent.id, $event)" class="text-on-surface-variant hover:text-error hover:bg-error/10 p-1.5 rounded-full transition-colors opacity-0 group-hover:opacity-100 flex items-center justify-center">
                                <span class="material-symbols-outlined text-[18px]" data-icon="delete">delete</span>
                            </button>
                        </div>
                        <p class="text-on-surface-variant font-manrope text-xs leading-relaxed line-clamp-3 mt-auto">{{ agent.content }}</p>
                    </div>
                </div>
            </div>

            <!-- Edit View -->
            <div *ngIf="!loading && isEditing && selectedAgent" class="bg-surface p-8 rounded-3xl border border-outline-variant/30 shadow-sm">
                <div class="flex justify-between items-center mb-6 border-b border-outline-variant/30 pb-4">
                    <h2 class="text-on-surface font-manrope text-lg font-bold tracking-tight">
                        {{ selectedAgent.id ? 'Edit Agent' : 'Create Agent' }}
                    </h2>
                    <button (click)="cancelEdit()" class="p-2 rounded-full text-on-surface-variant hover:bg-surface-variant/50 transition-colors flex items-center justify-center">
                        <span class="material-symbols-outlined text-xl" data-icon="close">close</span>
                    </button>
                </div>

                <div class="flex flex-col gap-6">
                    <div class="flex flex-col gap-2">
                        <label class="text-on-surface font-manrope text-sm font-semibold tracking-wide">Name</label>
                        <input type="text" [(ngModel)]="selectedAgent.name" placeholder="Agent Name"
                               class="w-full bg-surface-container-lowest border border-outline-variant/50 rounded-xl px-4 py-3 text-on-surface font-manrope text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="text-on-surface font-manrope text-sm font-semibold tracking-wide">Content (Markdown)</label>
                        <textarea [(ngModel)]="selectedAgent.content" placeholder="System instructions, persona, skills..." rows="12"
                                  class="w-full bg-surface-container-lowest border border-outline-variant/50 rounded-xl px-4 py-3 text-on-surface font-manrope text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all font-mono"></textarea>
                    </div>

                    <div class="flex justify-end gap-3 mt-4 pt-4 border-t border-outline-variant/30">
                        <button (click)="cancelEdit()" class="h-10 px-5 rounded-full text-on-surface font-manrope text-sm font-semibold tracking-wide hover:bg-surface-variant/50 transition-colors">
                            Cancel
                        </button>
                        <button (click)="saveAgent()"
                                [disabled]="!selectedAgent.name || !selectedAgent.content"
                                class="h-10 px-5 rounded-full bg-primary text-on-primary font-manrope text-sm font-semibold tracking-wide hover:bg-primary/90 transition-colors shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
                            Save Agent
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
