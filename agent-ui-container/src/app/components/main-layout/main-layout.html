<div class="flex h-full w-full overflow-hidden bg-surface">
    <!-- Sidebar Area -->
    <aside class="w-64 shrink-0 h-full border-r border-outline-variant/10 bg-surface-container-low dark:bg-slate-900 flex flex-col z-20 overflow-y-auto">
        <app-thread-list></app-thread-list>
    </aside>

    <!-- Content + Header Container -->
    <div class="flex-1 flex flex-col h-full overflow-hidden min-w-0">
        <!-- TopAppBar -->
        <header class="h-16 shrink-0 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md border-b border-outline-variant/10 flex justify-between items-center px-6">
            <div class="flex items-center gap-4">
                <h2 class="font-headline font-bold text-lg text-on-surface">Nexus AI | Strategic Thread</h2>
            </div>
            <div class="flex items-center gap-3">
                <div class="relative flex items-center bg-surface-container-low rounded-full px-4 py-1.5 border border-outline-variant/10">
                    <span class="material-symbols-outlined text-lg text-outline" data-icon="search">search</span>
                    <input class="bg-transparent border-none text-sm focus:ring-0 w-48" placeholder="Search thread..." type="text"/>
                </div>
                <span class="material-symbols-outlined text-outline cursor-pointer hover:text-primary transition-colors" data-icon="notifications">notifications</span>
                <span class="material-symbols-outlined text-outline cursor-pointer hover:text-primary transition-colors" data-icon="more_vert">more_vert</span>
            </div>
        </header>

        <!-- Workspace & Body -->
        <div class="flex-1 flex overflow-hidden">
            <!-- Central Chat Area -->
            <main class="flex-1 relative bg-surface overflow-hidden">
                <router-outlet></router-outlet>
            </main>

            <!-- Right Workspace Panel -->
            <section class="shrink-0 glass-panel border-l border-white/20 h-full overflow-y-auto p-6 space-y-6 bg-surface-variant/30 relative"
                     [style.width.px]="workspaceWidth">
                
                <!-- Resizer Handle -->
                <div class="absolute left-[-4px] top-0 bottom-0 w-3 cursor-col-resize z-50 group"
                     (mousedown)="startResizing($event)">
                    <!-- Visible Vertical Line -->
                    <div class="absolute left-1/2 top-0 bottom-0 w-[2px] bg-outline-variant/10 group-hover:bg-primary/50 transition-colors"></div>
                    <!-- Grab Pattern -->
                    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col gap-1 px-1 py-1.5 rounded-full bg-white/50 backdrop-blur-sm border border-outline-variant/10 opacity-0 group-hover:opacity-100 transition-opacity shadow-sm">
                        <div class="w-1 h-1 rounded-full bg-primary/40"></div>
                        <div class="w-1 h-1 rounded-full bg-primary/40"></div>
                        <div class="w-1 h-1 rounded-full bg-primary/40"></div>
                    </div>
                </div>
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-headline font-extrabold text-on-surface flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary" data-icon="dashboard_customize">dashboard_customize</span>
                        AI WORKSPACE
                    </h3>
                    <span class="text-[10px] font-bold uppercase tracking-widest text-primary bg-primary-fixed px-2 py-0.5 rounded">Live MFEs</span>
                </div>

                <app-visualizations-panel
                    [threadId]="activeThreadId"
                    [isThreadActive]="!!activeThreadId">
                </app-visualizations-panel>
            </section>
        </div>
    </div>
</div>
