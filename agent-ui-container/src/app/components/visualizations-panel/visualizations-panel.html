<div class="flex flex-col gap-6">
  <div *ngIf="loading && visualizations.length === 0" class="flex justify-center p-8">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div *ngIf="!loading && visualizations.length === 0" class="text-center text-outline/50 mt-8 text-sm font-medium">
    <p>No active visualizations in this thread.</p>
  </div>

  <div *ngFor="let viz of visualizations" class="bg-white/70 rounded-2xl overflow-hidden shadow-sm border border-white/40 hover:shadow-md transition-all hover:scale-[1.01] active:scale-[0.99] group cursor-pointer">
    <div class="p-5">
      <div class="flex justify-between items-start mb-4">
        <div>
          <p class="text-[10px] font-bold text-outline uppercase tracking-tight">{{ viz.name || viz.provider || 'AI Component' }}</p>
          <h4 class="font-headline font-bold text-on-surface line-clamp-1">{{ viz.description || 'Live Module' }}</h4>
        </div>
        <div class="flex items-center gap-2">
          <button (click)="toggleJsonView(viz.id); $event.stopPropagation()" class="p-1.5 hover:bg-primary/10 rounded-lg transition-all flex items-center justify-center text-primary" [title]="isJsonView(viz.id) ? 'View Module' : 'View Raw JSON'">
            <span class="material-symbols-outlined text-lg" [attr.data-icon]="isJsonView(viz.id) ? 'visibility' : 'database'">{{ isJsonView(viz.id) ? 'visibility' : 'database' }}</span>
          </button>
          <span class="material-symbols-outlined text-primary opacity-0 group-hover:opacity-100 transition-opacity" data-icon="north_east">north_east</span>
        </div>
      </div>
      <div class="overflow-x-auto">
        <div *ngIf="!isJsonView(viz.id)">
          <app-mfe-renderer [mfe]="viz.provider" [component]="viz.component" [content]="viz.content" [title]="viz.title" [name]="viz.name" [description]="viz.description" [id]="viz.id" (action)="handleMfeAction($event, viz.id)"></app-mfe-renderer>
        </div>
        <div *ngIf="isJsonView(viz.id)" class="json-viewer-container">
          <pre><code>{{ getFormattedJson(viz) }}</code></pre>
        </div>
      </div>
    </div>
    <div class="bg-primary/5 p-4 flex justify-between items-center border-t border-white/40 opacity-0 group-hover:opacity-100 transition-opacity">
      <p class="text-[10px] font-bold text-primary uppercase tracking-widest">Interact with MFE</p>
      <span class="material-symbols-outlined text-sm text-primary" data-icon="arrow_forward">arrow_forward</span>
    </div>
  </div>
</div>
