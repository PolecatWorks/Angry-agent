<div class="flex flex-col gap-6">
  <div *ngIf="loading && visualizations.length === 0" class="flex justify-center p-8">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div *ngIf="!loading && visualizations.length === 0" class="text-center text-outline mt-8 text-sm">
    <p>No visualizations or tools currently active for this thread.</p>
  </div>

  <div *ngFor="let viz of visualizations" class="bg-white/70 rounded-2xl overflow-hidden shadow-sm border border-white/40 hover:shadow-md transition-shadow">
    <div *ngIf="viz.description" class="p-3 border-b border-white/40 bg-white/50">
      <small class="text-xs font-semibold text-outline uppercase tracking-tight">{{ viz.description }}</small>
    </div>
    <div class="p-4 overflow-x-auto">
      <app-mfe-renderer [mfe]="viz.mfe" [component]="viz.component" [content]="viz.content"></app-mfe-renderer>
    </div>
  </div>
</div>
