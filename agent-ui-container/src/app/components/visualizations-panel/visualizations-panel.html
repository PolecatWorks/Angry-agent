<div class="flex flex-col gap-6">
  <div *ngIf="loading && visualizations.length === 0" class="flex justify-center p-8">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div *ngIf="!loading && visualizations.length === 0" class="text-center text-outline/50 mt-8 text-sm font-medium">
    <p>No active visualizations in this thread.</p>
  </div>

  <div *ngFor="let viz of visualizations" class="bg-white/70 rounded-2xl overflow-hidden shadow-sm border border-white/40 hover:shadow-md transition-all hover:scale-[1.01] active:scale-[0.99] group cursor-pointer">
    <div class="p-5">
      <div class="flex justify-between items-start mb-4">
        <div>
          <p class="text-[10px] font-bold text-outline uppercase tracking-tight">{{ viz.mfe || 'AI Component' }}</p>
          <h4 class="font-headline font-bold text-on-surface line-clamp-1">{{ viz.description || 'Live Module' }}</h4>
        </div>
        <span class="material-symbols-outlined text-primary opacity-0 group-hover:opacity-100 transition-opacity" data-icon="north_east">north_east</span>
      </div>
      <div class="overflow-x-auto">
        <app-mfe-renderer [mfe]="viz.mfe" [component]="viz.component" [content]="viz.content"></app-mfe-renderer>
      </div>
    </div>
    <div class="bg-primary/5 p-4 flex justify-between items-center border-t border-white/40 opacity-0 group-hover:opacity-100 transition-opacity">
      <p class="text-[10px] font-bold text-primary uppercase tracking-widest">Interact with MFE</p>
      <span class="material-symbols-outlined text-sm text-primary" data-icon="arrow_forward">arrow_forward</span>
    </div>
  </div>
</div>
