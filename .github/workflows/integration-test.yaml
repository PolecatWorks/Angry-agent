name: Integration Tests
on:
  pull_request:
    branches: [ main ]

concurrency:
  # This ensures only ONE job with this name runs across the whole repo
  group: k8s-integration-env
  # Set to false so the second PR waits in line instead of killing the first one
  cancel-in-progress: false

jobs:
  integration:
    runs-on: polecatworks-runner
    steps:
      - uses: actions/checkout@v4
      
      # The swap logic
      - name: Swap Service
        run: |
          echo "Deploying test version of service..."
          # Update the Helm release with the image from the current PR.
          # We use the PR-specific tag generated by the Docker publish workflow.
          # The --wait flag ensures the deployment is ready before tests start.
          helm upgrade angry-agent ./charts/agent-be \
            --reuse-values \
            --set image.tag=pr-${{ github.event.pull_request.number }} \
            --wait
          
          echo "Current deployment status:"
          kubectl get pods -l app.kubernetes.io/instance=angry-agent

      - name: Run Tests
        run: |
          # Running frontend integration/unit tests
          cd agent-ui-container
          npm test

      # The cleanup logic (Always runs even if tests fail)
      - name: Restore Original Service
        if: always()
        run: |
          echo "Restoring production-stable service..."
          # Rollback to the previous version to restore the stable state.
          # This ensures the environment is left in a clean state.
          helm rollback angry-agent
